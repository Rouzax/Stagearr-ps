version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Skip versions published within the last 7 days; freshly published
    # releases are where compromised versions surface before detection.
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
