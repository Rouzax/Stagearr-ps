name: Build Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release ZIP
        run: |
          mkdir -p build
          zip -r "build/Stagearr-v${{ steps.version.outputs.version }}.zip" \
            Stagearr.ps1 \
            Modules/ \
            config-sample.toml \
            LICENSE \
            README.md

      - name: Generate checksums
        working-directory: build
        run: sha256sum "Stagearr-v${{ steps.version.outputs.version }}.zip" > checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "build/Stagearr-v${{ steps.version.outputs.version }}.zip" \
            "build/checksums.txt" \
            --clobber
