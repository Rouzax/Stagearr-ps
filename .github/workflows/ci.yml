name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -RequiredVersion 1.23.0 -Force -Scope CurrentUser -Repository PSGallery

      - name: Analyze
        shell: pwsh
        run: |
          # Syntax-error check. PSScriptAnalyzer reports unparseable files with
          # Severity 'ParseError', which PSScriptAnalyzerSettings.psd1 (Severity =
          # Error,Warning) filters out, so a file that does not parse would slip
          # through. Catch it directly with the language parser first.
          $parseErrors = Get-ChildItem -Path . -Recurse -File -Include *.ps1, *.psm1, *.psd1 | ForEach-Object {
              $errs = $null
              [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errs)
              foreach ($e in $errs) {
                  [pscustomobject]@{ File = $_.FullName; Line = $e.Extent.StartLineNumber; Message = $e.Message }
              }
          }
          if ($parseErrors) {
              $parseErrors | Format-Table File, Line, Message -AutoSize | Out-String -Width 200 | Write-Host
          }

          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          if ($results) {
              $results | Sort-Object Severity, ScriptName, Line |
                  Format-Table Severity, RuleName, ScriptName, Line, Message -AutoSize | Out-String -Width 200 | Write-Host
          }
          $errors = @($results | Where-Object Severity -eq 'Error')
          $warnings = @($results | Where-Object Severity -eq 'Warning')
          $parseCount = @($parseErrors).Count
          Write-Host ("ParseErrors: {0}  Errors: {1}  Warnings: {2}" -f $parseCount, $errors.Count, $warnings.Count)
          # Gate on parse errors and errors; warnings are advisory while the legacy baseline is reduced.
          if ($parseCount -gt 0 -or $errors.Count -gt 0) {
              Write-Error "PSScriptAnalyzer found $parseCount parse error(s) and $($errors.Count) error(s)."
              exit 1
          }

  test:
    name: Pester
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser -Repository PSGallery

      - name: Run tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './Tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config
