site_name: Stagearr
site_url: https://rouzax.github.io/Stagearr-ps/docs/
site_description: "Automated media processing pipeline for qBittorrent"
repo_url: https://github.com/Rouzax/Stagearr-ps
repo_name: Rouzax/Stagearr-ps
edit_uri: edit/main/docs/

site_dir: build/docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - qBittorrent Integration: qbittorrent.md
      - Quick Start: quick-start.md
  - How It Works:
      - Pipeline Overview: pipeline.md
      - Video Processing: video-processing.md
      - Subtitle Processing: subtitles.md
      - Importing to Radarr / Sonarr / Medusa: importing.md
      - Email Notifications: email.md
  - Configuration:
      - Configuration Overview: configuration.md
      - Settings Reference: settings-reference.md
      - Labels & Content Routing: labels.md
  - Operations:
      - CLI Usage & Parameters: cli-usage.md
      - Job Queue & Locking: queue-locking.md
      - Re-running Jobs: rerun.md
      - Auto-Update: updates.md
  - Troubleshooting & FAQ: troubleshooting.md
